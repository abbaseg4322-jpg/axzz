<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أنا لحبيبتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Tajawal:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="youtube-player"></div>

    <div class="crystal-box" id="magic-box" style="pointer-events: none;">
        <span id="box-text">جاري التحميل...</span>
    </div>

    <div class="lyrics-container">
        <div class="lyric-line" id="line1">أنتِ النبض الذي يحيي أيامي،<br>واللحن الذي يعزف في قلبي.</div>
        <div class="lyric-line" id="line2">لم تكوني يوماً مجرد اختيار،<br>بل أنتِ أجمل وأعظم أقداري.</div>
        <div class="lyric-line" id="line3">في ابتسامتكِ أجد سلامي،<br>وفي قربكِ تكتمل كل تفاصيل سعادتي.</div>
    </div>

    <div class="finale-section" id="finale">
        <div class="main-title">أنا لحبيبتي</div>
        <div class="subtitle">أحبكِ يا سارتي</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
